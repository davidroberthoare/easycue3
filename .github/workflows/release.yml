name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --no-default-features --features audio,usb

      - name: Package
        run: |
          PKG=easycue3-linux-x86_64
          mkdir -p $PKG
          cp target/release/easycue3 $PKG/
          cp -r media shows fixture_profiles $PKG/
          tar czf $PKG.tar.gz $PKG/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: easycue3-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --no-default-features --features audio,usb

      - name: Package
        shell: pwsh
        run: |
          $PKG = "easycue3-windows-x86_64"
          New-Item -ItemType Directory -Path $PKG
          Copy-Item target\release\easycue3.exe $PKG\
          Copy-Item -Recurse media, shows, fixture_profiles $PKG\
          Compress-Archive -Path $PKG -DestinationPath "$PKG.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: easycue3-windows-x86_64.zip

  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --no-default-features --features audio,usb --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --no-default-features --features audio,usb --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create -output easycue3 \
            target/x86_64-apple-darwin/release/easycue3 \
            target/aarch64-apple-darwin/release/easycue3

      - name: Package
        run: |
          PKG=easycue3-macos-universal
          mkdir -p $PKG
          cp easycue3 $PKG/
          cp -r media shows fixture_profiles $PKG/
          zip -r $PKG.zip $PKG/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: easycue3-macos-universal.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/easycue3-linux-x86_64.tar.gz
            windows/easycue3-windows-x86_64.zip
            macos/easycue3-macos-universal.zip
          generate_release_notes: true
